name: Sidecar CI/CD

# Continuous integration and delivery for the Forge LLM sidecar:
#   - lint  (ruff)
#   - format check (black)
#   - tests (pytest)
#   - build a Docker image, and publish it to GHCR on master.

on:
  push:
    paths:
      - "forge-llm-sidecar/**"
      - ".github/workflows/sidecar-ci.yml"
  pull_request:
    paths:
      - "forge-llm-sidecar/**"
      - ".github/workflows/sidecar-ci.yml"

permissions:
  contents: read

concurrency:
  group: sidecar-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: forge-llm-sidecar

jobs:
  lint-test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: forge-llm-sidecar/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Tests (pytest)
        run: pytest -q

  docker:
    name: Build & publish image
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name (lower-cased)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}/forge-llm-sidecar" >> "$GITHUB_OUTPUT"

      # Publishing only happens on master; PRs and feature branches build only.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (on master) push
        uses: docker/build-push-action@v6
        with:
          context: forge-llm-sidecar
          file: forge-llm-sidecar/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
